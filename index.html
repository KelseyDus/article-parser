<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArticleVault</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080c14; --surface: #0e1420; --surface2: #141b2d;
      --border: #1e2a40; --accent: #0af; --text: #e2e8f0; --muted: #64748b;
    }
    html, body, #root { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; overflow: hidden; }
    input::placeholder { color: var(--muted); }
    select option { background: var(--surface); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const TAG_COLORS = {
  "Technology":"#00d4ff","Science":"#7c3aed","Business":"#f59e0b",
  "Politics":"#ef4444","Health":"#10b981","Culture":"#ec4899",
  "Environment":"#22c55e","Finance":"#f97316","AI/ML":"#6366f1",
  "Sports":"#14b8a6","Education":"#8b5cf6","World News":"#3b82f6",
  "Design":"#e879f9","Philosophy":"#a78bfa","Other":"#94a3b8"
};

const S = {
  bg:"#080c14", surface:"#0e1420", surface2:"#141b2d",
  border:"#1e2a40", accent:"#0af", text:"#e2e8f0", muted:"#64748b",
};

function tc(cat) { return TAG_COLORS[cat] || TAG_COLORS["Other"]; }

async function analyzeArticle(url) {
  const res = await fetch("/api/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ url }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `Server error ${res.status}`);
  }
  return res.json();
}

function Spinner({ size = 14, color = "#0af" }) {
  return <span style={{
    display:"inline-block", width:size, height:size, flexShrink:0,
    border:`2px solid ${color}33`, borderTopColor:color,
    borderRadius:"50%", animation:"spin 0.8s linear infinite"
  }} />;
}

function Modal({ article, onClose }) {
  const color = tc(article.category);
  useEffect(() => {
    const h = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  return (
    <div onClick={onClose} style={{
      position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", backdropFilter:"blur(4px)",
      zIndex:200, display:"flex", alignItems:"center", justifyContent:"center",
      padding:24, animation:"fadeIn 0.15s ease",
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background:S.surface, border:`1px solid ${S.border}`, borderRadius:20,
        maxWidth:680, width:"100%", maxHeight:"85vh", overflowY:"auto",
        animation:"slideUp 0.2s ease",
      }}>
        {/* header */}
        <div style={{
          padding:"24px 26px 18px", borderBottom:`1px solid ${S.border}`,
          position:"sticky", top:0, background:S.surface, zIndex:1,
          display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:16,
        }}>
          <div>
            <span style={{ fontFamily:"monospace", fontSize:10, letterSpacing:1, textTransform:"uppercase", padding:"3px 10px", borderRadius:20, background:`${color}22`, color, marginBottom:10, display:"inline-block" }}>
              {article.category}
            </span>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:19, fontWeight:800, lineHeight:1.3, color:S.text, marginTop:6 }}>{article.title}</div>
          </div>
          <button onClick={onClose} style={{ background:S.surface2, border:`1px solid ${S.border}`, color:S.text, borderRadius:8, padding:"6px 10px", cursor:"pointer", fontSize:16, flexShrink:0 }}>✕</button>
        </div>

        {/* body */}
        <div style={{ padding:"22px 26px 28px" }}>
          {[
            { label:"Summary", content:<p style={{ fontSize:15, lineHeight:1.7, color:"#cbd5e1" }}>{article.summary}</p> },
            article.keyPoints?.length > 0 && { label:"Key Points", content:(
              <ul style={{ listStyle:"none" }}>
                {article.keyPoints.map((pt,i) => (
                  <li key={i} style={{ display:"flex", gap:10, marginBottom:8, fontSize:14, lineHeight:1.6, color:"#cbd5e1" }}>
                    <span style={{ color:"#0af", flexShrink:0 }}>▸</span><span>{pt}</span>
                  </li>
                ))}
              </ul>
            )},
            article.tags?.length > 0 && { label:"Tags", content:(
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {article.tags.map(tag => (
                  <span key={tag} style={{ fontFamily:"monospace", fontSize:11, padding:"4px 12px", borderRadius:20, background:S.surface2, color:S.muted, border:`1px solid ${S.border}` }}>#{tag}</span>
                ))}
              </div>
            )},
            { label:"Details", content:(
              <>
                <div style={{ display:"flex", gap:12, flexWrap:"wrap", alignItems:"center", marginBottom:16 }}>
                  <span style={{ fontFamily:"monospace", fontSize:11, color:S.muted }}>⏱ {article.readingTime||"?"} min read</span>
                  <span style={{ fontFamily:"monospace", fontSize:11, color:S.muted }}>📅 {new Date(article.addedAt).toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}</span>
                  {article.sentiment && (
                    <span style={{ fontFamily:"monospace", fontSize:11, padding:"2px 10px", borderRadius:20,
                      background: article.sentiment==="positive"?"rgba(16,185,129,0.15)":article.sentiment==="negative"?"rgba(239,68,68,0.15)":"rgba(100,116,139,0.15)",
                      color: article.sentiment==="positive"?"#10b981":article.sentiment==="negative"?"#ef4444":"#94a3b8"
                    }}>
                      {article.sentiment==="positive"?"😊":article.sentiment==="negative"?"😟":"😐"} {article.sentiment}
                    </span>
                  )}
                </div>
                <a href={article.url} target="_blank" rel="noopener noreferrer" style={{ display:"inline-flex", alignItems:"center", gap:6, color:"#0af", fontFamily:"monospace", fontSize:12, textDecoration:"none", padding:"8px 14px", background:"rgba(0,170,255,0.1)", borderRadius:8, border:"1px solid rgba(0,170,255,0.2)" }}>
                  ↗ Read Full Article
                </a>
              </>
            )},
          ].filter(Boolean).map(({ label, content }) => (
            <div key={label} style={{ marginBottom:22 }}>
              <div style={{ fontFamily:"monospace", fontSize:11, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", color:"#0af", marginBottom:10 }}>{label}</div>
              {content}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Card({ article, onSelect, onDelete, viewMode }) {
  const color = tc(article.category);
  const isList = viewMode === "list";
  return (
    <div
      onClick={() => onSelect(article)}
      style={{ background:S.surface, border:`1px solid ${S.border}`, borderRadius:14, overflow:"hidden", cursor:"pointer", transition:"all 0.2s", display:isList?"flex":"block" }}
      onMouseEnter={e => { e.currentTarget.style.borderColor="rgba(0,170,255,0.35)"; e.currentTarget.style.transform="translateY(-2px)"; e.currentTarget.style.boxShadow="0 8px 32px rgba(0,0,0,0.4)"; }}
      onMouseLeave={e => { e.currentTarget.style.borderColor=S.border; e.currentTarget.style.transform="none"; e.currentTarget.style.boxShadow="none"; }}
    >
      <div style={{ background:`linear-gradient(${isList?"180deg":"90deg"},${color},${color}88)`, [isList?"width":"height"]:3, flexShrink:0 }} />
      <div style={{ padding:18, flex:1 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
          <span style={{ fontFamily:"monospace", fontSize:10, letterSpacing:1, textTransform:"uppercase", padding:"3px 10px", borderRadius:20, background:`${color}22`, color }}>{article.category}</span>
          <span style={{ fontFamily:"monospace", fontSize:11, color:S.muted }}>{new Date(article.addedAt).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
        </div>
        <div style={{ fontFamily:"'Syne',sans-serif", fontSize:15, fontWeight:700, lineHeight:1.4, marginBottom:8, color:S.text }}>{article.title||"Untitled"}</div>
        <div style={{ fontSize:13, lineHeight:1.6, color:"#94a3b8", display:"-webkit-box", WebkitLineClamp:isList?2:3, WebkitBoxOrient:"vertical", overflow:"hidden", marginBottom:12 }}>{article.summary}</div>
        {!isList && article.keyPoints?.length > 0 && (
          <div style={{ marginBottom:12 }}>
            <div style={{ fontFamily:"monospace", fontSize:10, letterSpacing:1, textTransform:"uppercase", color:S.muted, marginBottom:5 }}>Key Points</div>
            {article.keyPoints.slice(0,2).map((pt,i) => (
              <div key={i} style={{ display:"flex", gap:8, fontSize:12, color:"#94a3b8", lineHeight:1.5, marginBottom:3 }}>
                <span style={{ color:"#0af", flexShrink:0 }}>▸</span><span>{pt}</span>
              </div>
            ))}
          </div>
        )}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", paddingTop:10, borderTop:`1px solid ${S.border}` }}>
          <span style={{ fontFamily:"monospace", fontSize:10, color:S.muted, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:180 }}>{article.domain||article.url}</span>
          <div style={{ display:"flex", gap:8, alignItems:"center" }} onClick={e => e.stopPropagation()}>
            <span style={{ fontFamily:"monospace", fontSize:10, color:S.muted }}>⏱ {article.readingTime||"?"} min</span>
            <a href={article.url} target="_blank" rel="noopener noreferrer"
              style={{ background:"none", border:"none", color:S.muted, cursor:"pointer", fontSize:14, textDecoration:"none" }}
              onMouseEnter={e=>e.currentTarget.style.color="#0af"} onMouseLeave={e=>e.currentTarget.style.color=S.muted}>↗</a>
            <button onClick={() => onDelete(article.id)}
              style={{ background:"none", border:"none", color:S.muted, cursor:"pointer", fontSize:14 }}
              onMouseEnter={e=>e.currentTarget.style.color="#ef4444"} onMouseLeave={e=>e.currentTarget.style.color=S.muted}>🗑</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [articles, setArticles] = useState(() => {
    try { return JSON.parse(localStorage.getItem("articlevault_v1") || "[]"); } catch { return []; }
  });
  const [url, setUrl] = useState("");
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState("");
  const [error, setError] = useState("");
  const [search, setSearch] = useState("");
  const [activeCategory, setActiveCategory] = useState("All");
  const [selected, setSelected] = useState(null);
  const [sort, setSort] = useState("newest");
  const [viewMode, setViewMode] = useState("grid");

  useEffect(() => {
    try { localStorage.setItem("articlevault_v1", JSON.stringify(articles)); } catch {}
  }, [articles]);

  const counts = articles.reduce((acc, a) => { acc[a.category] = (acc[a.category]||0)+1; return acc; }, {});

  const filtered = articles
    .filter(a => activeCategory === "All" || a.category === activeCategory)
    .filter(a => {
      if (!search) return true;
      const q = search.toLowerCase();
      return (a.title||"").toLowerCase().includes(q) || (a.summary||"").toLowerCase().includes(q) || (a.tags||[]).some(t=>t.toLowerCase().includes(q)) || (a.category||"").toLowerCase().includes(q);
    })
    .sort((a,b) => {
      if (sort==="newest") return new Date(b.addedAt)-new Date(a.addedAt);
      if (sort==="oldest") return new Date(a.addedAt)-new Date(b.addedAt);
      return (a.title||"").localeCompare(b.title||"");
    });

  async function handleAdd() {
    const trimmed = url.trim();
    if (!trimmed) return;
    if (articles.some(a => a.url === trimmed)) { setError("Already in your library."); return; }
    setError(""); setLoading(true); setLoadingMsg("🔍 Fetching article...");
    try {
      setLoadingMsg("🤖 Analyzing with AI...");
      const data = await analyzeArticle(trimmed);
      setLoadingMsg("✨ Adding to library...");
      setArticles(prev => [{ id:Date.now(), url:trimmed, addedAt:new Date().toISOString(), ...data }, ...prev]);
      setUrl("");
    } catch(e) {
      setError("Failed to analyze. Check the URL and try again. " + e.message);
    } finally { setLoading(false); setLoadingMsg(""); }
  }

  function deleteArticle(id) {
    setArticles(prev => prev.filter(a => a.id !== id));
    if (selected?.id === id) setSelected(null);
  }

  return (
    <div style={{ height:"100%", display:"flex", flexDirection:"column" }}>

      {/* Header */}
      <div style={{ background:S.surface, borderBottom:`1px solid ${S.border}`, padding:"16px 28px", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:34, height:34, background:"linear-gradient(135deg,#0af,#7c3aed)", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:17 }}>📚</div>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:19, fontWeight:800, letterSpacing:-0.5 }}>
            Article<span style={{ color:"#0af" }}>Vault</span>
          </div>
        </div>
        <div style={{ display:"flex", gap:20, fontFamily:"monospace", fontSize:12, color:S.muted }}>
          <span><span style={{ color:"#0af" }}>{articles.length}</span> articles</span>
          <span><span style={{ color:"#0af" }}>{Object.keys(counts).length}</span> topics</span>
          <span><span style={{ color:"#0af" }}>{articles.reduce((s,a)=>s+(a.readingTime||0),0)}</span> min saved</span>
        </div>
      </div>

      {/* Body */}
      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

        {/* Sidebar */}
        <div style={{ width:230, background:S.surface, borderRight:`1px solid ${S.border}`, padding:"20px 0", overflowY:"auto", flexShrink:0 }}>
          <div style={{ padding:"0 14px" }}>
            <div style={{ fontFamily:"monospace", fontSize:10, letterSpacing:2, textTransform:"uppercase", color:S.muted, marginBottom:10 }}>Topics</div>
            {[["All",articles.length],...Object.entries(counts).sort((a,b)=>b[1]-a[1])].map(([cat,count]) => {
              const active = activeCategory===cat;
              return (
                <button key={cat} onClick={()=>setActiveCategory(cat)} style={{
                  display:"flex", alignItems:"center", justifyContent:"space-between",
                  width:"100%", padding:"7px 10px",
                  background:active?"rgba(0,170,255,0.1)":"transparent",
                  border:"none", color:active?"#0af":S.text,
                  cursor:"pointer", borderRadius:6,
                  fontFamily:"'DM Sans',sans-serif", fontSize:13,
                  marginBottom:2, textAlign:"left",
                }}>
                  {cat==="All"?"All Articles":cat}
                  <span style={{ fontFamily:"monospace", fontSize:11, background:active?"rgba(0,170,255,0.2)":S.surface2, color:active?"#0af":S.muted, padding:"1px 7px", borderRadius:10 }}>{count}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Main */}
        <div style={{ flex:1, padding:28, overflowY:"auto" }}>

          {/* Input */}
          <div style={{ background:S.surface, border:`1px solid ${S.border}`, borderRadius:16, padding:22, marginBottom:24, position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:"linear-gradient(90deg,#0af,#7c3aed)" }} />
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:15, fontWeight:700, marginBottom:14 }}>➕ Add Article to Library</div>
            <div style={{ display:"flex", gap:10 }}>
              <input
                value={url} onChange={e=>setUrl(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&!loading&&handleAdd()}
                disabled={loading}
                placeholder="Paste any article URL — https://example.com/article"
                style={{ flex:1, background:S.bg, border:`1px solid ${S.border}`, borderRadius:10, padding:"11px 14px", color:S.text, fontFamily:"monospace", fontSize:13, outline:"none" }}
              />
              <button onClick={handleAdd} disabled={loading||!url.trim()} style={{
                background:"linear-gradient(135deg,#0af,#0077bb)", border:"none", borderRadius:10,
                padding:"11px 22px", color:"#000", fontFamily:"'Syne',sans-serif",
                fontSize:14, fontWeight:700, cursor:loading||!url.trim()?"not-allowed":"pointer",
                opacity:loading||!url.trim()?0.6:1, whiteSpace:"nowrap",
                display:"flex", alignItems:"center", gap:8,
              }}>
                {loading ? <Spinner size={13} color="#000" /> : "⚡"} {loading?"Analyzing…":"Analyze"}
              </button>
            </div>
            {loading && (
              <div style={{ marginTop:12, background:S.bg, border:`1px solid ${S.border}`, borderRadius:8, padding:"10px 14px", fontFamily:"monospace", fontSize:12, color:"#0af", display:"flex", alignItems:"center", gap:8 }}>
                <Spinner /> {loadingMsg}
              </div>
            )}
            {error && <div style={{ marginTop:10, background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:8, padding:"9px 13px", fontFamily:"monospace", fontSize:12, color:"#fca5a5" }}>⚠️ {error}</div>}
          </div>

          {/* Search + controls */}
          <div style={{ display:"flex", gap:10, marginBottom:18, alignItems:"center" }}>
            <div style={{ flex:1, position:"relative" }}>
              <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:S.muted, pointerEvents:"none" }}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search titles, summaries, tags..."
                style={{ width:"100%", background:S.surface, border:`1px solid ${S.border}`, borderRadius:10, padding:"11px 14px 11px 38px", color:S.text, fontFamily:"'DM Sans',sans-serif", fontSize:14, outline:"none" }} />
            </div>
            <select value={sort} onChange={e=>setSort(e.target.value)} style={{ background:S.surface, border:`1px solid ${S.border}`, borderRadius:10, padding:"11px 14px", color:S.text, fontFamily:"monospace", fontSize:12, outline:"none", cursor:"pointer" }}>
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="az">A → Z</option>
            </select>
            <div style={{ display:"flex", gap:4, background:S.surface, border:`1px solid ${S.border}`, borderRadius:8, padding:4 }}>
              {[["grid","⊞"],["list","☰"]].map(([mode,icon]) => (
                <button key={mode} onClick={()=>setViewMode(mode)} style={{ background:viewMode===mode?S.surface2:"transparent", border:"none", color:viewMode===mode?S.text:S.muted, cursor:"pointer", padding:"5px 10px", borderRadius:5, fontSize:14 }}>{icon}</button>
              ))}
            </div>
          </div>

          {/* Section header */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:17, fontWeight:700 }}>
              {activeCategory==="All"?"Your Library":activeCategory}
            </div>
            <div style={{ fontFamily:"monospace", fontSize:12, color:S.muted }}>
              {filtered.length} article{filtered.length!==1?"s":""}{search?` matching "${search}"`:""}
            </div>
          </div>

          {/* Grid / List */}
          {filtered.length === 0 ? (
            <div style={{ textAlign:"center", padding:"80px 24px", color:S.muted }}>
              <div style={{ fontSize:48, marginBottom:16, opacity:0.4 }}>{articles.length===0?"📭":"🔎"}</div>
              <div style={{ fontFamily:"'Syne',sans-serif", fontSize:20, fontWeight:700, marginBottom:8, color:S.text }}>
                {articles.length===0?"Your library is empty":"No results found"}
              </div>
              <div style={{ fontSize:14 }}>
                {articles.length===0?"Paste an article URL above to get started — AI will summarize and catalog it.":"Try a different search or topic filter."}
              </div>
            </div>
          ) : (
            <div style={{ display:"grid", gridTemplateColumns:viewMode==="list"?"1fr":"repeat(auto-fill,minmax(320px,1fr))", gap:16 }}>
              {filtered.map(article => (
                <Card key={article.id} article={article} onSelect={setSelected} onDelete={deleteArticle} viewMode={viewMode} />
              ))}
            </div>
          )}
        </div>
      </div>

      {selected && <Modal article={selected} onClose={()=>setSelected(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
